<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="BLAZE SKATE LAB flame reflection preview">
  <defs>
    <linearGradient id="bg" x1="90" y1="64" x2="420" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4fffb"/>
    </linearGradient>
    <linearGradient id="flame" x1="176" y1="76" x2="350" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#ddd6fe"/>
      <stop offset="0.58" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="core" x1="236" y1="150" x2="294" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="reflection" x1="256" y1="316" x2="256" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#10b981" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-45%" y="-45%" width="190%" height="190%">
